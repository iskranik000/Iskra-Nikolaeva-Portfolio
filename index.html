<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskra Nikolaeva - Graphic & Motion Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz@10..48&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background: #ffffff;
            overflow-x: hidden;
        }

        .section {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Chrome Magazine Section with Video Overlay */
        .chrome-section {
            background: #000;
        }

        .video-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .video-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
        }

        /* Navigation Dots */
        .nav-dots {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(0, 0, 0, 0.5);
        }

        .dot.active {
            background: #000;
            transform: scale(1.3);
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            animation: bounce 2s infinite;
        }

        .scroll-indicator p {
            font-size: 12px;
            color: #666;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        @media (max-width: 768px) {
            .nav-dots {
                right: 15px;
                gap: 10px;
            }

            .dot {
                width: 10px;
                height: 10px;
            }

            .video-overlay {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- Section 1: Intro -->
    <section class="section" id="section-0">
        <img src="images/1.png" alt="Introduction">
    </section>

    <!-- Section 2: Chrome Magazine with Video -->
    <section class="section chrome-section" id="section-1">
        <img src="images/2.png" alt="Chrome Magazine" style="position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1;">
        <div class="video-overlay">
            <iframe src="https://vimeo.com/reviews/e4f9d4c1-296c-4cf2-bfab-4b0dc72669b4/videos/1211054726" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
    </section>

    <!-- Section 3: Nelvet -->
    <section class="section" id="section-2">
        <img src="images/3.png" alt="Nelvet Cafe">
    </section>

    <!-- Section 4: Roma -->
    <section class="section" id="section-3">
        <img src="images/4.png" alt="Roma">
    </section>

    <!-- Section 5: About -->
    <section class="section" id="section-4">
        <img src="images/5.png" alt="About">
    </section>

    <!-- Section 6: Soul Labs -->
    <section class="section" id="section-5">
        <img src="images/6.png" alt="Soul Labs">
    </section>

    <!-- Section 7: National Trust -->
    <section class="section" id="section-6">
        <img src="images/7.png" alt="National Trust">
    </section>

    <!-- Section 8: Bath College SU -->
    <section class="section" id="section-7">
        <img src="images/8.png" alt="Bath College SU">
    </section>

    <!-- Navigation Dots -->
    <div class="nav-dots" id="navDots"></div>

    <!-- Scroll Indicator -->
    <div class="scroll-indicator" id="scrollIndicator">
        <p>Scroll</p>
    </div>

    <script>
        const totalSections = 8;
        let currentSection = 0;
        let isScrolling = false;

        // Create navigation dots
        const navDots = document.getElementById('navDots');
        for (let i = 0; i < totalSections; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => scrollToSection(i));
            navDots.appendChild(dot);
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSection);
            });
        }

        function scrollToSection(index) {
            currentSection = index;
            const section = document.getElementById(`section-${index}`);
            section.scrollIntoView({ behavior: 'smooth' });
            updateDots();
        }

        // Wheel scroll detection
        document.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            isScrolling = true;

            if (e.deltaY > 0) {
                currentSection = Math.min(currentSection + 1, totalSections - 1);
            } else {
                currentSection = Math.max(currentSection - 1, 0);
            }
            
            scrollToSection(currentSection);
            
            setTimeout(() => {
                isScrolling = false;
            }, 800);
        }, { passive: true });

        // Hide scroll indicator after first scroll
        document.addEventListener('wheel', () => {
            const indicator = document.getElementById('scrollIndicator');
            if (indicator) {
                indicator.style.display = 'none';
            }
        }, { once: true });

        // Touch swipe support
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            if (touchStartY - touchEndY > 50) {
                currentSection = Math.min(currentSection + 1, totalSections - 1);
                scrollToSection(currentSection);
            } else if (touchEndY - touchStartY > 50) {
                currentSection = Math.max(currentSection - 1, 0);
                scrollToSection(currentSection);
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                currentSection = Math.min(currentSection + 1, totalSections - 1);
                scrollToSection(currentSection);
            } else if (e.key === 'ArrowUp') {
                currentSection = Math.max(currentSection - 1, 0);
                scrollToSection(currentSection);
            }
        });
    </script>
</body>
</html>
